name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Go mod tidy
        run: go mod tidy

      - name: Build Linux (amd64)
        run: go build -ldflags="-s -w" -o yeah-linux-amd64 ./cmd/main.go

      - name: Build macOS (amd64)
        run: go build -ldflags="-s -w" -o yeah-darwin-amd64 ./cmd/main.go

      - name: Build Windows (amd64)
        run: go build -ldflags="-s -w" -o yeah-windows-amd64.exe ./cmd/main.go

      - name: Build Android (arm64)
        run: |
          GOOS=android GOARCH=arm64 go build -ldflags="-s -w" -o yeah-android-arm64 ./cmd/main.go

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: "yeah ${{ github.ref_name }}"
          draft: false
          prerelease: false

      - name: Upload Linux binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./yeah-linux-amd64
          asset_name: yeah-linux-amd64
          asset_content_type: application/octet-stream

      - name: Upload macOS binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./yeah-darwin-amd64
          asset_name: yeah-darwin-amd64
          asset_content_type: application/octet-stream

      - name: Upload Windows binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./yeah-windows-amd64.exe
          asset_name: yeah-windows-amd64.exe
          asset_content_type: application/vnd.microsoft.portable-executable

      - name: Upload Android binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./yeah-android-arm64
          asset_name: yeah-android-arm64
          asset_content_type: application/octet-stream
