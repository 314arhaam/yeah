name: Build and Release

on:
  push:
    tags:
      - "v*"  # Trigger on version tags like v1.0.0

jobs:
  build_and_release:  # Renamed job to reflect combined actions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22" # Changed to a stable version

      - name: Go mod tidy
        run: go mod tidy

      - name: Build binaries
        run: |
          # Build binaries directly into the workspace root for easy upload
          go build -ldflags="-s -w" -o yeah-linux-amd64 ./cmd/main.go
          go build -ldflags="-s -w" -o yeah-darwin-amd64 ./cmd/main.go
          go build -ldflags="-s -w" -o yeah-windows-amd64.exe ./cmd/main.go

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: "yeah ${{ github.ref_name }}"
          draft: false
          prerelease: false

      - name: Upload Linux binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./yeah-linux-amd64 # Path is now directly in the workspace root
          asset_name: yeah-linux-amd64
          asset_content_type: application/octet-stream

      - name: Upload macOS binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./yeah-darwin-amd64 # Path is now directly in the workspace root
          asset_name: yeah-darwin-amd64
          asset_content_type: application/octet-stream

      - name: Upload Windows binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./yeah-windows-amd64.exe # Path is now directly in the workspace root
          asset_name: yeah-windows-amd64.exe
          asset_content_type: application/vnd.microsoft.portable-executable
