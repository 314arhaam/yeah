name: Send Release Binaries to Telegram (v2)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to send binaries from (e.g. v1.0.0)'
        required: true

jobs:
  send_release_to_telegram:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release assets
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ github.event.inputs.tag }}
          # Only download files that look like binaries (executables)
          # You might need to adjust this pattern if your binaries have different extensions
          filter: |
            *.tar.gz
            *.zip
            yeah-linux-amd64
            yeah-darwin-amd64
            yeah-windows-amd64.exe
          tarBall: false
          zipBall: false

      - name: List downloaded files (for debugging)
        run: ls -lh

      - name: Calculate SHA256 checksums
        id: checksums
        run: |
          echo "Calculating checksums..."
          declare -A SHA256_CHECKSUMS
          for FILE in *; do
            if [[ -f "$FILE" ]]; then
              # Make sure we only process downloaded files, not other repo files if any
              # This assumes downloaded files are directly in the root after download
              # Adjust if robinraju/release-downloader extracts them into a subfolder
              if [[ "$FILE" == "yeah-"* ]] || [[ "$FILE" == "*.exe" ]] || [[ "$FILE" == "*.tar.gz" ]] || [[ "$FILE" == "*.zip" ]]; then
                CHECKSUM=$(sha256sum "$FILE" | awk '{print $1}')
                echo "::set-output name=${FILE}_checksum::${CHECKSUM}"
                SHA256_CHECKSUMS["$FILE"]="$CHECKSUM"
                echo "$FILE: $CHECKSUM"
              fi
            fi
          done
          # Store all checksums for later use if needed
          echo "::set-output name=all_checksums::$(declare -p SHA256_CHECKSUMS)"

      - name: Generate custom styled message
        id: custom_message
        run: |
          MESSAGE="🚀 *Release files for tag* \`v${{ github.event.inputs.tag }}\` *are now being sent to Telegram!* 🚀\n\n"
          MESSAGE+="✨ *Binaries & Checksums:* ✨\n"
          
          # Loop through the checksums output by the previous step
          # Note: This requires a bit of shell magic to parse the associative array
          # If this fails, we can simplify it to just list files and their checksums
          eval $(echo "${{ steps.checksums.outputs.all_checksums }}" | sed "s/declare -A/declare -A parsed_checksums/")
          
          for file in "${!parsed_checksums[@]}"; do
            checksum=${parsed_checksums[$file]}
            MESSAGE+="\n• \`$file\`\n  SHA256: \`$checksum\`"
          done
          
          MESSAGE+="\n\n_Please verify the checksums after download._"
          echo "::set-output name=message::$(echo "$MESSAGE" | sed 's/:/\\:/g' | sed 's/"/\\"/g')" # Escape for use in curl

      - name: Send styled message to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d parse_mode="MarkdownV2" \
            -d text="${{ steps.custom_message.outputs.message }}" \
            "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage"

      - name: Send release binaries to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "Uploading binaries to Telegram..."
          for FILE in *; do
            if [[ -f "$FILE" ]]; then
              # Check if it's one of the files we expect to be binaries and calculated checksums for
              if [[ "$FILE" == "yeah-"* ]] || [[ "$FILE" == "*.exe" ]] || [[ "$FILE" == "*.tar.gz" ]] || [[ "$FILE" == "*.zip" ]]; then
                CHECKSUM_VARNAME="${FILE}_checksum"
                CHECKSUM=$(echo "${{ steps.checksums.outputs.$CHECKSUM_VARNAME }}" || echo "N/A") # Fallback if variable not set
                
                echo "Uploading $FILE with SHA256: $CHECKSUM"
                
                CAPTION="*File:* \`$FILE\`\n*SHA256:* \`$CHECKSUM\`\n*Release Tag:* \`${{ github.event.inputs.tag }}\`"
                
                curl -s -X POST \
                  -F "chat_id=$TELEGRAM_CHAT_ID" \
                  -F "caption=$CAPTION" \
                  -F "document=@$FILE" \
                  -H "Content-Type: multipart/form-data" \
                  "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendDocument"
              fi
            fi
          done
