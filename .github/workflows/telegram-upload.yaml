name: Send Release Binaries to Telegram (stable)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to send binaries from (e.g., v1.0.0)"
        required: true

jobs:
  send_release_to_telegram:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release assets
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ github.event.inputs.tag }}
          fileName: "yeah-*"
          tarBall: false
          zipBall: false

      - name: List downloaded files
        run: ls -lh

      - name: Calculate SHA256 checksums
        run: |
          > checksums.txt
          for f in yeah-linux-amd64 yeah-darwin-amd64 yeah-windows-amd64.exe; do
            if [[ -f "$f" ]]; then
              sha256sum "$f" >> checksums.txt
            fi
          done

          echo "Checksums:"
          cat checksums.txt || true

      - name: Build message (plain text, safe)
        id: msg
        run: |
          MESSAGE="🚀 New Release

                Repository: ${{ github.repository }}
                Tag: ${{ github.event.inputs.tag }}
                
                Description: Release binaries
                Link: https://github.com/${{ github.repository }}/releases/tag/${{ github.event.inputs.tag }}"

          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send message to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            --data-urlencode "text=${{ steps.msg.outputs.message }}"

      - name: Send binaries and checksums
  env:
    TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
    TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  run: |
    echo "Uploading binaries..."

    for FILE in yeah-linux-amd64 yeah-darwin-amd64 yeah-windows-amd64.exe; do
      if [[ -f "$FILE" ]]; then
        CHECKSUM=$(grep "$FILE" checksums.txt | awk '{print $1}')

        CAPTION="File: $FILE"$'\n'"SHA256: $CHECKSUM"$'\n'"Tag: ${{ github.event.inputs.tag }}"

        curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendDocument" \
          -F chat_id="$TELEGRAM_CHAT_ID" \
          -F caption="$CAPTION" \
          -F document=@"$FILE"

        echo " -> Sent $FILE"
      else
        echo "Missing: $FILE"
      fi
    done

    if [[ -f checksums.txt ]]; then
      curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendDocument" \
        -F chat_id="$TELEGRAM_CHAT_ID" \
        -F caption="Full checksums list" \
        -F document=@checksums.txt
    fi
