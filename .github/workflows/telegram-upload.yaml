name: Send Release Binaries to Telegram (v2)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to send binaries from (e.g., v1.0.0)'
        required: true

jobs:
  send_release_to_telegram:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release assets
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ github.event.inputs.tag }}
          filter: |
            katana-linux-amd64
            katana-darwin-amd64
            katana-windows-amd64.exe
            *.tar.gz
            *.zip
          tarBall: false
          zipBall: false

      - name: List downloaded files (for debugging)
        run: ls -lh

      - name: Calculate SHA256 checksums
        run: |
          echo "Calculating checksums..."
          # For each expected binary, generate checksum
          for f in katana-linux-amd64 katana-darwin-amd64 katana-windows-amd64.exe; do
            if [[ -f "$f" ]]; then
              sha256sum "$f" >> checksums.txt
            fi
          done
          echo "Generated checksums:"
          ls -lh
          cat checksums.txt

      - name: Generate custom styled message
        id: custom_message
        run: |
          MESSAGE="🚀 *Release \`${{ github.event.inputs.tag }}\` files are being transmitted!* 🚀\
          \n\n_This batch includes binaries & their SHA256 checksums._"
          
          # List file checksums
          while IFS= read -r line; do
            FILE=$(echo "$line" | awk '{print $2}')
            CHECKSUM=$(echo "$line" | awk '{print $1}')
            MESSAGE+="\n• \`$FILE\`\n  SHA256: \`$CHECKSUM\`"
          done < checksums.txt
          
          MESSAGE+="\n\n_Please verify the checksums after download._"
          
          echo "::set-output name=message::$(echo "$MESSAGE" | sed 's/:/\\:/g' | sed 's/"/\\"/g')"

      - name: Send styled message to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d parse_mode="MarkdownV2" \
            -d text="${{ steps.custom_message.outputs.message }}" \
            "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage"

      - name: Send binaries and checksums to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "Uploading binaries to Telegram..."

          # Loop through known binaries
          for FILE in katana-linux-amd64 katana-darwin-amd64 katana-windows-amd64.exe; do
            if [[ -f "$FILE" ]]; then
              CHECKSUM=$(grep "$FILE" checksums.txt | awk '{print $1}')
              CAPTION="*File:* \`$FILE\`\n*SHA256:* \`$CHECKSUM\`\n_Tag:_ \`${{ github.event.inputs.tag }}\`"
              curl -s -X POST \
                -F "chat_id=$TELEGRAM_CHAT_ID" \
                -F "caption=$CAPTION" \
                -F "parse_mode=MarkdownV2" \
                -F "document=@$FILE" \
                "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendDocument"
              echo " -> Sent $FILE"
            fi
          done

          # Also send the checksums.txt file
          curl -s -X POST \
            -F "chat_id=$TELEGRAM_CHAT_ID" \
            -F "caption=_Full checksums list_" \
            -F "parse_mode=MarkdownV2" \
            -F "document=@checksums.txt" \
            "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendDocument"
