name: Send Release Binaries to Telegram (v2)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to send binaries from (e.g., v1.0.0)"
        required: true

jobs:
  send_release_to_telegram:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release assets
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ github.event.inputs.tag }}
          fileName: "yeah-*"
          tarBall: false
          zipBall: false

      - name: List downloaded files
        run: ls -lh

      - name: Calculate SHA256 checksums
        run: |
          > checksums.txt
          for f in yeah-linux-amd64 yeah-darwin-amd64 yeah-windows-amd64.exe; do
            if [[ -f "$f" ]]; then
              sha256sum "$f" >> checksums.txt
            fi
          done

      - name: Generate MarkdownV2 message
        id: custom_message
        run: |
          escape() {
            sed -E 's/([_*\[\]()~`>#+\-=|{}.!])/\\\1/g'
          }

          REPO=$(echo "${{ github.repository }}" | escape)
          TAG=$(echo "${{ github.event.inputs.tag }}" | escape)
          LINK=$(echo "https://github.com/${{ github.repository }}/releases/tag/${{ github.event.inputs.tag }}" | escape)

          MESSAGE="🚀 *New Release!*\n\n"
          MESSAGE+="📦 *Repository:* ${REPO}\n"
          MESSAGE+="🏷️ *Tag:* ${TAG}\n\n"
          MESSAGE+="📝 *Description:* Release binaries\n"
          MESSAGE+="🔗 *Link:* ${LINK}\n\n"

          if [[ -s checksums.txt ]]; then
            MESSAGE+="*Checksums:*\n"
            while IFS= read -r line; do
              FILE=$(echo "$line" | awk '{print $2}' | escape)
              CHECKSUM=$(echo "$line" | awk '{print $1}' | escape)

              MESSAGE+="• \`${FILE}\`\n"
              MESSAGE+="  SHA256: \`${CHECKSUM}\`\n\n"
            done < checksums.txt
          else
            MESSAGE+="_No binaries found._\n"
          fi

          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo -e "$MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send message to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d parse_mode="MarkdownV2" \
            --data-urlencode "text=${{ steps.custom_message.outputs.message }}"

      - name: Send binaries and checksums
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          escape() {
            sed -E 's/([_*\[\]()~`>#+\-=|{}.!])/\\\1/g'
          }

          for FILE in yeah-linux-amd64 yeah-darwin-amd64 yeah-windows-amd64.exe; do
            if [[ -f "$FILE" ]]; then
              CHECKSUM=$(grep "$FILE" checksums.txt | awk '{print $1}' | escape)
              FILE_ESC=$(echo "$FILE" | escape)
              TAG_ESC=$(echo "${{ github.event.inputs.tag }}" | escape)

              CAPTION="*File:* ${FILE_ESC}\n*SHA256:* \`${CHECKSUM}\`\n_Tag:_ ${TAG_ESC}"

              curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendDocument" \
                -F "chat_id=$TELEGRAM_CHAT_ID" \
                -F "parse_mode=MarkdownV2" \
                -F "caption=$CAPTION" \
                -F "document=@$FILE"

              echo " -> Sent $FILE"
            fi
          done

          if [[ -f checksums.txt ]]; then
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendDocument" \
              -F "chat_id=$TELEGRAM_CHAT_ID" \
              -F "parse_mode=MarkdownV2" \
              -F "caption=_Full checksums list_" \
              -F "document=@checksums.txt"
          fi