name: Send Release Binaries to Telegram (v2)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to send binaries from (e.g., v1.0.0)"
        required: true

jobs:
  send_release_to_telegram:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release assets
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ github.event.inputs.tag }}
          fileName: "yeah-*"
          tarBall: false
          zipBall: false

      - name: List downloaded files (for debugging)
        run: ls -lh

      - name: Calculate SHA256 checksums
        run: |
          echo "Calculating checksums..."
          > checksums.txt

          for f in yeah-linux-amd64 yeah-darwin-amd64 yeah-windows-amd64.exe; do
            if [[ -f "$f" ]]; then
              sha256sum "$f" >> checksums.txt
            fi
          done

          echo "Generated checksums:"
          cat checksums.txt || echo "No checksums generated"

      - name: Generate custom styled message
        id: custom_message
        run: |
          MESSAGE="🚀 <b>New Release!</b><br><br>"
          MESSAGE+="📦 <b>Repository:</b> ${{ github.repository }}<br>"
          MESSAGE+="🏷️ <b>Tag:</b> ${{ github.event.inputs.tag }}<br><br>"
          MESSAGE+="📝 <b>Description:</b> Release binaries<br>"
          MESSAGE+="🔗 <b>Link:</b> https://github.com/${{ github.repository }}/releases/tag/${{ github.event.inputs.tag }}<br><br>"

          if [[ -s checksums.txt ]]; then
            MESSAGE+="<b>Checksums:</b><br>"

            while IFS= read -r line; do
              FILE=$(echo "$line" | awk '{print $2}')
              CHECKSUM=$(echo "$line" | awk '{print $1}')

              MESSAGE+="• <code>$FILE</code><br>"
              MESSAGE+="SHA256: <code>$CHECKSUM</code><br><br>"
            done < checksums.txt
          else
            MESSAGE+="<i>No binaries found.</i><br>"
          fi

          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send styled message to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d parse_mode="HTML" \
            --data-urlencode "text=${{ steps.custom_message.outputs.message }}"

      - name: Send binaries and checksums to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "Uploading binaries to Telegram..."

          for FILE in yeah-linux-amd64 yeah-darwin-amd64 yeah-windows-amd64.exe; do
            if [[ -f "$FILE" ]]; then
              CHECKSUM=$(grep "$FILE" checksums.txt | awk '{print $1}')

              CAPTION="<b>File:</b> $FILE
<b>SHA256:</b> <code>$CHECKSUM</code>
<i>Tag:</i> ${{ github.event.inputs.tag }}"

              curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendDocument" \
                -F "chat_id=$TELEGRAM_CHAT_ID" \
                -F "parse_mode=HTML" \
                -F "caption=$CAPTION" \
                -F "document=@$FILE"

              echo " -> Sent $FILE"
            fi
          done

          if [[ -f checksums.txt ]]; then
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendDocument" \
              -F "chat_id=$TELEGRAM_CHAT_ID" \
              -F "parse_mode=HTML" \
              -F "caption=<b>Full checksums list</b>" \
              -F "document=@checksums.txt"
          fi